<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>rendo</title>
  <style>
    body, html { height:100%; margin:0; overflow:hidden; background:black; }
    canvas { display:block; }
    #text {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #0f0;
      font-family: 'Courier New', monospace;
      font-size: 120px;
      font-weight: bold;
      text-shadow: 0 0 10px #0f0;
      pointer-events: none;
      z-index: 10;
      letter-spacing: 8px;
      transition: all 1s ease;
    }
    #text.shifted {
      top: 92%; left: 88%;
      transform: translate(-50%, -50%);
      font-size: 60px;
    }
    #gallery {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      display: none;
      z-index: 5;
      pointer-events: none;
    }
    .draggable {
      position: absolute;
      cursor: move;
      user-select: none;
      pointer-events: auto;
      resize: both;
      overflow: auto;
      min-width: 100px;
      min-height: 100px;
      border: 2px solid #0f0;
      box-shadow: 0 0 15px #0f0;
    }
    .draggable img {
      width: 100%; height: 100%;
      object-fit: cover;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="text">RENDO</div>
  <div id="gallery"></div>

  <script>
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');
    c.height = window.innerHeight;
    c.width = window.innerWidth;

    const matrix = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ123456789@#$%^&*()*&^%+-/~{[|`]}".split("");
    const fontSize = 14;
    const cols = c.width / fontSize;
    const drops = Array(Math.floor(cols)).fill(1);

    function draw() {
      ctx.fillStyle = 'rgba(0,0,0,0.04)';
      ctx.fillRect(0,0,c.width,c.height);
      ctx.fillStyle = '#0f0';
      ctx.font = fontSize + 'px monospace';

      for (let i = 0; i < drops.length; i++) {
        const txt = matrix[Math.floor(Math.random()*matrix.length)];
        ctx.fillText(txt, i*fontSize, drops[i]*fontSize);
        if (drops[i]*fontSize > c.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }

    setInterval(draw, 35);

    window.addEventListener('resize', () => {
      c.height = window.innerHeight;
      c.width = window.innerWidth;
    });

    // Easter egg + draggable/resizable images from /pictures/
    let typed = '';
    document.addEventListener('keydown', e => {
      typed += e.key.toLowerCase();
      if (typed.length > 4) typed = typed.slice(-4);
      if (typed === '1337') {
        document.getElementById('text').classList.add('shifted');
        const gallery = document.getElementById('gallery');
        gallery.style.display = 'block';

        if (gallery.children.length === 0) {
          for (let i = 1; i <= 6; i++) {
            const div = document.createElement('div');
            div.className = 'draggable';
            div.style.left = (20 + (i-1) * 220) + 'px';
            div.style.top  = (100 + ((i-1) % 3) * 220) + 'px';
            div.style.width = '200px';
            div.style.height = '200px';

            const img = document.createElement('img');
            img.src = `./pictures/${i}.jpg`;
            div.appendChild(img);

            makeDraggable(div);
            gallery.appendChild(div);
          }
        }

        typed = '';
      }
    });

    function makeDraggable(el) {
      let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
      el.onmousedown = dragMouseDown;

      function dragMouseDown(e) {
        e = e || window.event;
        e.preventDefault();
        pos3 = e.clientX;
        pos4 = e.clientY;
        document.onmouseup = closeDrag;
        document.onmousemove = elementDrag;
      }

      function elementDrag(e) {
        e = e || window.event;
        e.preventDefault();
        pos1 = pos3 - e.clientX;
        pos2 = pos4 - e.clientY;
        pos3 = e.clientX;
        pos4 = e.clientY;
        el.style.top  = (el.offsetTop  - pos2) + "px";
        el.style.left = (el.offsetLeft - pos1) + "px";
      }

      function closeDrag() {
        document.onmouseup = null;
        document.onmousemove = null;
      }
    }
  </script>
</body>
</html>
