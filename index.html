<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>rendo</title>
  <style>
    body, html { height:100%; margin:0; overflow:hidden; background:black; }
    canvas { display:block; }
    #text {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #0f0;
      font-family: 'Courier New', monospace;
      font-size: 120px;
      font-weight: bold;
      text-shadow: 0 0 10px #0f0;
      pointer-events: none;
      z-index: 10;
      letter-spacing: 8px;
      transition: all 1s ease;
    }
    #text.shifted {
      top: 92%; left: 88%;
      transform: translate(-50%, -50%);
      font-size: 60px;
    }
    #gallery {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      display: none;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      z-index: 5;
      width: 80%; max-width: 900px;
    }
    #gallery img {
      width: 100%; height: auto;
      border: 2px solid #0f0;
      box-shadow: 0 0 15px #0f0;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="text">RENDO</div>
  <div id="gallery">
    <img src="pictures/1.jpg" alt="Victoria Justice">
    <img src="pictures/2.jpg" alt="pic2">
    <img src="pictures/3.jpg" alt="pic3">
    <img src="pictures/4.jpg" alt="pic4">
    <img src="pictures/5.jpg" alt="pic5">
    <img src="pictures/6.jpg" alt="pic6">
  </div>

  <script>
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');
    c.height = window.innerHeight;
    c.width = window.innerWidth;

    const matrix = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ123456789@#$%^&*()*&^%+-/~{[|`]}".split("");
    const fontSize = 14;
    const cols = c.width / fontSize;
    const drops = Array(Math.floor(cols)).fill(1);

    function draw() {
      ctx.fillStyle = 'rgba(0,0,0,0.04)';
      ctx.fillRect(0,0,c.width,c.height);
      ctx.fillStyle = '#0f0';
      ctx.font = fontSize + 'px monospace';

      for (let i = 0; i < drops.length; i++) {
        const txt = matrix[Math.floor(Math.random()*matrix.length)];
        ctx.fillText(txt, i*fontSize, drops[i]*fontSize);
        if (drops[i]*fontSize > c.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }

    setInterval(draw, 35);

    window.addEventListener('resize', () => {
      c.height = window.innerHeight;
      c.width = window.innerWidth;
    });

    let typed = '';
    document.addEventListener('keydown', e => {
      typed += e.key;
      if (typed.length > 4) typed = typed.slice(-4);
      if (typed === '1337') {
        document.getElementById('text').classList.add('shifted');
        document.getElementById('gallery').style.display = 'grid';
        typed = '';
      }
    });
  </script>
</body>
</html>
