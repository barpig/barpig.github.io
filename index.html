<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>barpig // 3D lair (debug mode)</title>
  <style>
    body { margin:0; overflow:hidden; font-family: monospace; background:#000; color:#0f0; }
    #blocker {
      position: absolute; inset:0; background:rgba(0,0,0,0.8); z-index:100;
      display:flex; align-items:center; justify-content:center;
    }
    #instructions {
      text-align:center; padding:40px; border:3px solid #0f0; border-radius:16px;
      max-width:500px; cursor:pointer; background:rgba(0,20,0,0.6);
    }
    #instructions h2 { margin:0 0 15px; font-size:2.8em; text-shadow:0 0 10px #0f0; }
    #status { margin-top:20px; color:#ff0; font-size:1.2em; }
  </style>
</head>
<body>
  <div id="blocker">
    <div id="instructions">
      <h2>barpig's 3D lair</h2>
      <p>Click this box to enter (desktop Chrome/Firefox only)</p>
      <p>WASD / Arrows = move | Mouse = look | ESC = exit</p>
      <div id="status">Waiting for click...</div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js';
    import { PointerLockControls } from 'https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/controls/PointerLockControls.js';

    console.log('Three.js & PointerLockControls imported successfully');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000022);

    const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 1000);
    camera.position.set(0, 1.6, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new PointerLockControls(camera, document.body);
    console.log('Controls initialized');

    const blocker = document.getElementById('blocker');
    const instructions = document.getElementById('instructions');
    const status = document.getElementById('status');

    instructions.addEventListener('click', () => {
      console.log('Click detected - attempting lock');
      status.textContent = 'Attempting pointer lock...';
      controls.lock();
    });

    controls.addEventListener('lock', () => {
      console.log('LOCK SUCCESS - pointer locked!');
      blocker.style.display = 'none';
      status.textContent = 'Locked! Use WASD + mouse';
    });

    controls.addEventListener('unlock', () => {
      console.log('UNLOCKED');
      blocker.style.display = 'flex';
      status.textContent = 'Unlocked - click to re-enter';
    });

    document.addEventListener('pointerlockerror', (e) => {
      console.error('Pointer lock ERROR:', e);
      status.textContent = 'Lock failed - check console (F12). Try waiting 2s after ESC.';
      status.style.color = '#f44';
    });

    // Simple test scene (big green cube so you know it's rendering)
    const geometry = new THREE.BoxGeometry(2, 2, 2);
    const material = new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true });
    const cube = new THREE.Mesh(geometry, material);
    scene.add(cube);

    scene.add(new THREE.AmbientLight(0xffffff, 1));

    function animate() {
      requestAnimationFrame(animate);
      cube.rotation.x += 0.01;
      cube.rotation.y += 0.01;

      if (controls.isLocked) {
        // Movement would go here (add later)
      }

      renderer.render(scene, camera);
    }
    animate();

    console.log('Scene & animation loop started');
  </script>
</body>
</html>
