<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>rendo</title>
  <style>
    body, html { height:100%; margin:0; overflow:hidden; background:black; }
    canvas { display:block; }
    #text {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #0f0;
      font-family: 'Courier New', monospace;
      font-size: 120px;
      font-weight: bold;
      text-shadow: 0 0 10px #0f0;
      pointer-events: none;
      z-index: 10;
      letter-spacing: 8px;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="text">RENDO</div>

  <script>
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');
    c.height = window.innerHeight;
    c.width = window.innerWidth;

    const matrix = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ123456789@#$%^&*()*&^%+-/~{[|`]}".split("");
    const fontSize = 14;
    const cols = c.width / fontSize;
    const drops = Array(Math.floor(cols)).fill(1);

    function draw() {
      ctx.fillStyle = 'rgba(0,0,0,0.04)';
      ctx.fillRect(0,0,c.width,c.height);
      ctx.fillStyle = '#0f0';
      ctx.font = fontSize + 'px monospace';

      for (let i = 0; i < drops.length; i++) {
        const txt = matrix[Math.floor(Math.random()*matrix.length)];
        ctx.fillText(txt, i*fontSize, drops[i]*fontSize);
        if (drops[i]*fontSize > c.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }

    setInterval(draw, 35);

    window.addEventListener('resize', () => {
      c.height = window.innerHeight;
      c.width = window.innerWidth;
    });
  </script>
</body>
</html>
