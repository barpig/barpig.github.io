<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>rendo</title>
  <meta property="og:title" content="rendo">
  <meta property="og:description" content="Matrix vibes.">
  <meta property="og:image" content="https://barpig.github.io/pictures/splash.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://barpig.github.io/">
  <meta name="twitter:card" content="summary_large_image">

  <style>
    body, html { height:100%; margin:0; overflow:hidden; background:black; font-family:'Courier New',monospace; }
    canvas { display:block; }
    #text {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #0f0;
      font-size: 120px;
      font-weight: bold;
      text-shadow: 0 0 10px #0f0;
      pointer-events: none;
      z-index: 10;
      letter-spacing: 8px;
      transition: all 1s ease;
    }
    #text.shifted {
      top: 92%; left: 88%;
      transform: translate(-50%, -50%);
      font-size: 60px;
    }
    .pic {
      position: absolute;
      display: none;
      width: 220px;
      height: auto;
      border: 2px solid #0f0;
      box-shadow: 0 0 15px #0f0;
      cursor: move;
      user-select: none;
      z-index: 5;
    }
    .keypop {
      position: absolute;
      pointer-events: none;
      font-size: 80px;
      font-weight: bold;
      z-index: 8;
      text-shadow: 0 0 15px currentColor;
      opacity: 0;
      animation: pop 1.2s forwards;
    }
    @keyframes pop {
      0%   { opacity:0; transform:scale(0.5) translateY(0); }
      20%  { opacity:1; transform:scale(1.3) translateY(-20px); }
      100% { opacity:0; transform:scale(1) translateY(-120px); }
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="text">RENDO</div>

  <img class="pic" src="pictures/1.jpg" style="top:20%;left:15%;">
  <img class="pic" src="pictures/2.jpg" style="top:25%;left:40%;">
  <img class="pic" src="pictures/3.jpg" style="top:30%;left:65%;">
  <img class="pic" src="pictures/4.jpg" style="top:55%;left:10%;">
  <img class="pic" src="pictures/5.jpg" style="top:60%;left:35%;">
  <img class="pic" src="pictures/6.jpg" style="top:65%;left:60%;">

  <audio id="thock" preload="auto">
    <source src="/thock.mp3" type="audio/mpeg">
  </audio>

  <script>
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');
    c.height = window.innerHeight;
    c.width = window.innerWidth;

    const matrix = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ123456789@#$%^&*()*&^%+-/~{[|`]}".split("");
    const fontSize = 14;
    const cols = c.width / fontSize;
    const drops = Array(Math.floor(cols)).fill(1);

    function draw() {
      ctx.fillStyle = 'rgba(0,0,0,0.04)';
      ctx.fillRect(0,0,c.width,c.height);
      ctx.fillStyle = '#0f0';
      ctx.font = fontSize + 'px monospace';
      for (let i = 0; i < drops.length; i++) {
        const txt = matrix[Math.floor(Math.random()*matrix.length)];
        ctx.fillText(txt, i*fontSize, drops[i]*fontSize);
        if (drops[i]*fontSize > c.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }
    setInterval(draw, 35);

    window.addEventListener('resize', () => {
      c.height = window.innerHeight;
      c.width = window.innerWidth;
    });

    const thock = document.getElementById('thock');
    let typed = '';
    let unlocked = false;

    document.addEventListener('keydown', e => {
      if (e.key.length !== 1) return;
      typed += e.key.toLowerCase();
      if (typed.length > 4) typed = typed.slice(-4);

      // visual + sound
      const pop = document.createElement('div');
      pop.className = 'keypop';
      pop.textContent = e.key.toUpperCase();
      
      const is137 = ['1','3','7'].includes(e.key);
      pop.style.color = is137 ? '#0f0' : (Math.random() > 0.5 ? '#00f' : '#f00');
      
      pop.style.left = Math.random() * 90 + 5 + '%';
      pop.style.top  = Math.random() * 70 + 10 + '%';
      
      document.body.appendChild(pop);
      setTimeout(() => pop.remove(), 1300);

      thock.currentTime = 0;
      thock.play().catch(()=>{});

      if (typed === '1337' && !unlocked) {
        document.getElementById('text').classList.add('shifted');
        document.querySelectorAll('.pic').forEach(img => {
          img.style.display = 'block';
          makeDraggable(img);
          makeResizable(img);
        });
        unlocked = true;
        typed = '';
      }
    });

    function makeDraggable(el) {
      let pos1=0,pos2=0,pos3=0,pos4=0;
      el.onmousedown = e => {
        e.preventDefault();
        pos3 = e.clientX; pos4 = e.clientY;
        document.onmouseup = () => { document.onmouseup = document.onmousemove = null; };
        document.onmousemove = e => {
          e.preventDefault();
          pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY;
          pos3 = e.clientX; pos4 = e.clientY;
          el.style.top  = (el.offsetTop  - pos2) + "px";
          el.style.left = (el.offsetLeft - pos1) + "px";
        };
      };
    }

    function makeResizable(el) {
      el.addEventListener('dblclick', () => {
        const w = parseInt(el.style.width) || 220;
        el.style.width = (w === 220 ? 440 : 220) + 'px';
      });
    }
  </script>
</body>
</html>
